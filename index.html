<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI智能简历分析系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI智能简历分析系统</h1>
            <p class="subtitle">基于DeepSeek AI的智能简历筛选与匹配平台</p>
        </header>

        <main>
            <section class="card" id="resume-section">
                <h2>简历上传</h2>
                <div class="upload-area" id="upload-area">
                    <input type="file" id="resume-file" accept=".pdf" hidden>
                    <div class="upload-placeholder">
                        <span class="icon">📄</span>
                        <p>点击或拖拽PDF文件到此处上传</p>
                        <p class="hint">仅支持文本型PDF，最大10MB</p>
                    </div>
                </div>
                <div class="progress-area" id="resume-progress" style="display: none;">
                    <p class="status-text">正在解析中...</p>
                    <div class="progress-bar">
                        <div class="progress-fill" id="resume-progress-bar"></div>
                    </div>
                </div>
                <div class="result-area" id="resume-result" style="display: none;">
                    <h3>解析结果</h3>
                    <div class="result-content" id="resume-result-content"></div>
                </div>
            </section>

            <section class="card" id="job-section">
                <h2>岗位需求</h2>
                <div class="form-group">
                    <label for="job-description">岗位描述</label>
                    <textarea id="job-description" rows="8" placeholder="请输入岗位需求描述..."></textarea>
                </div>
                <button class="btn primary" id="parse-job-btn">解析岗位</button>
                <div class="progress-area" id="job-progress" style="display: none;">
                    <p class="status-text">正在解析中...</p>
                </div>
                <div class="result-area" id="job-result" style="display: none;">
                    <h3>解析结果</h3>
                    <div class="result-content" id="job-result-content"></div>
                </div>
            </section>

            <section class="card" id="match-section">
                <h2>匹配分析</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label for="resume-select">选择简历</label>
                        <select id="resume-select">
                            <option value="">请先上传简历</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="job-select">选择岗位</label>
                        <select id="job-select">
                            <option value="">请先解析岗位</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="match-mode">匹配模式</label>
                    <select id="match-mode">
                        <option value="quick">快速匹配（仅规则匹配）</option>
                        <option value="standard" selected>标准匹配（规则+语义）</option>
                        <option value="deep">深度匹配（细粒度语义分析）</option>
                    </select>
                </div>
                <button class="btn primary" id="start-match-btn">开始匹配</button>
                <div class="progress-area" id="match-progress" style="display: none;">
                    <p class="status-text">正在匹配中...</p>
                    <div class="progress-bar">
                        <div class="progress-fill" id="match-progress-bar"></div>
                    </div>
                </div>
            </section>

            <section class="card" id="result-section" style="display: none;">
                <h2>匹配结果</h2>
                <div class="score-display">
                    <div class="score-circle" id="score-circle">
                        <span class="score-value" id="score-value">0</span>
                        <span class="score-label">综合评分</span>
                    </div>
                    <div class="recommendation" id="recommendation"></div>
                </div>
                <div class="result-tabs">
                    <button class="tab-btn active" data-tab="rule">规则匹配</button>
                    <button class="tab-btn" data-tab="semantic">语义匹配</button>
                </div>
                <div class="tab-content active" id="rule-tab">
                    <div class="result-content" id="rule-result-content"></div>
                </div>
                <div class="tab-content" id="semantic-tab">
                    <div class="result-content" id="semantic-result-content"></div>
                </div>
            </section>
        </main>

        <footer>
            <p>© 2026 AI智能简历分析系统 | Powered by DeepSeek AI</p>
        </footer>
    </div>

    <script src="js/api.js"></script>
    <script src="js/resume.js"></script>
    <script src="js/job.js"></script>
    <script src="js/match.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
